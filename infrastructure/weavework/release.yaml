apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: weavework-hr
  namespace: flux-system
spec:
  interval: 1m0s
  chart:
    spec:
      chart: ./charts/gitops-server
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: GitRepository
        name: flux-system
  values:
    deployment:
      additionalContainers: [ ] # Gardez-le si dĂŠjĂ  prĂŠsent
      securityContext:
        capabilities:
          drop:
            - NET_RAW
    adminUser:
      create: true
      passwordHash: $2a$12$XStXAMW19LmvcT3sDOdaEOw9r4IhpZoZIkhBKr6HYUEJdKaTPsqHy
      username: admin
    service:
      port: 9001
      targetPort: 9001
      type: ClusterIP