apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: flux-operator
      version: "0.48.0"
      sourceRef:
        kind: HelmRepository
        name: flux-operator-oci
        namespace: flux-system
  install:
    createNamespace: true
  upgrade:
    remediation:
      retries: 3