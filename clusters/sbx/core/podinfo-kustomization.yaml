apiVersion: v1
kind: Namespace
metadata:
  name: podinfo
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: podinfo
  namespace: flux-system
spec:
  interval: 30m0s
  path: ./kustomize
  prune: true
  retryInterval: 2m0s
  sourceRef:
    kind: GitRepository
    name: podinfo
  targetNamespace: podinfo
  timeout: 3m0s
  wait: true
  patches:
    - target:
        kind: Deployment
        name: podinfo
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: podinfo
        spec:
          template:
            spec:
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                seccompProfile:
                  type: RuntimeDefault
              containers:
                - name: podinfod  
                  securityContext:
                    allowPrivilegeEscalation: false
                    readOnlyRootFilesystem: true
                    runAsNonRoot: true
                    capabilities:
                      drop:
                        - ALL
                    seccompProfile:
                      type: RuntimeDefault

    - target:
        kind: Deployment
        name: podinfo
      patch: |
        - op: replace
          path: /spec/template/spec/containers/0/env/0/value
          value: "<h1>Hello from Cluster CORE</h1>"