apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system-infra-weavework
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./infrastructure/weavework
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system-infra-flux-operator
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./infrastructure/flux-operator
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system