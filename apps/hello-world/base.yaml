apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: podinfo-hello
  namespace: hello-world
spec:
  interval: 10m
  releaseName: podinfo
  targetNamespace: hello-world
  chart:
    spec:
      chart: podinfo
      version: "6.6.0"
      sourceRef:
        kind: HelmRepository
        name: podinfo
        namespace: flux-system
  values:
    ui:
      message: "Mon Hello World via Flux et Cilium !"
      color: "#345ecf"
    securityContext:
      enabled: true
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 3000
      fsGroup: 2000
      seccompProfile:
        type: RuntimeDefault
      containerSecurityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true # Pour la policy "hug-test"
        capabilities:
          drop:
            - ALL
    replicaCount: 1
  install:
    createNamespace: true