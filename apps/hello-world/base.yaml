apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: podinfo-base
  namespace: flux-system
spec:
  interval: 30m
  path: ./kustomize
  prune: true
  sourceRef:
    kind: GitRepository
    name: podinfo
  targetNamespace: podinfo
  patches:
    - target:
        kind: Deployment
        name: podinfo
      patch: |-
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: podinfo
        spec:
          template:
            spec:
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                seccompProfile: {type: RuntimeDefault}
              containers:
                - name: podinfod
                  securityContext:
                    allowPrivilegeEscalation: false
                    capabilities: {drop: ["ALL"]}